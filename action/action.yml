name: "Rewind Assert"
description: "Run agent regression tests with Rewind — check sessions against baselines for step-level regressions."
author: "agentoptics"
branding:
  icon: "rewind"
  color: "blue"

inputs:
  baseline:
    description: "Baseline name to check against (created with `rewind assert baseline`)"
    required: true
  session:
    description: "Session to check (ID, prefix, or 'latest')"
    required: false
    default: "latest"
  token-tolerance:
    description: "Token tolerance percentage (default: 20)"
    required: false
    default: "20"
  warn-model-change:
    description: "Treat model changes as warnings instead of failures"
    required: false
    default: "false"
  rewind-data:
    description: "Path to Rewind data directory (default: ~/.rewind)"
    required: false
    default: ""
  version:
    description: "Rewind CLI version to install (default: latest)"
    required: false
    default: "latest"

outputs:
  result:
    description: "'passed' or 'failed'"
    value: ${{ steps.check.outputs.result }}
  summary:
    description: "Human-readable result summary"
    value: ${{ steps.check.outputs.summary }}

runs:
  using: "composite"
  steps:
    - name: Install Rewind CLI
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        # Install via pip (includes CLI auto-download)
        if [ "$INPUT_VERSION" = "latest" ]; then
          pip install rewind-agent -q
        else
          pip install "rewind-agent==${INPUT_VERSION}" -q
        fi

        # Verify installation
        rewind --version || python -m rewind_cli --version || {
          echo "::error::Failed to install Rewind CLI"
          exit 1
        }

    - name: Run regression check
      id: check
      shell: bash
      env:
        REWIND_DATA: ${{ inputs.rewind-data }}
        INPUT_SESSION: ${{ inputs.session }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_TOKEN_TOLERANCE: ${{ inputs.token-tolerance }}
        INPUT_WARN_MODEL_CHANGE: ${{ inputs.warn-model-change }}
      run: |
        # Build command
        CMD="rewind assert check ${INPUT_SESSION} --against ${INPUT_BASELINE} --token-tolerance ${INPUT_TOKEN_TOLERANCE}"

        if [ "$INPUT_WARN_MODEL_CHANGE" = "true" ]; then
          CMD="$CMD --warn-model-change"
        fi

        # Unset REWIND_DATA if empty (use default ~/.rewind)
        if [ -z "$REWIND_DATA" ]; then
          unset REWIND_DATA
        fi

        echo "::group::Rewind Assertion Check"
        echo "Running: $CMD"
        echo ""

        # Capture output and exit code
        set +e
        OUTPUT=$($CMD 2>&1)
        EXIT_CODE=$?
        set -e

        echo "$OUTPUT"
        echo "::endgroup::"

        # Extract summary line
        SUMMARY=$(echo "$OUTPUT" | grep "Result:" | head -1 | sed 's/.*Result: *//')

        if [ $EXIT_CODE -eq 0 ]; then
          echo "result=passed" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "### :white_check_mark: Rewind Regression Check — PASSED" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "result=failed" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "### :x: Rewind Regression Check — FAILED" >> "$GITHUB_STEP_SUMMARY"
        fi

        # Write detailed results to step summary
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        echo "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

        # Fail the step if check failed
        exit $EXIT_CODE
