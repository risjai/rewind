name: Release

on:
  push:
    branches: [master, main]
    paths: [Cargo.toml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_release: ${{ steps.meta.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version needs a release
        id: meta
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $VERSION — will release as $TAG"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Web UI
        working-directory: web
        run: npm ci && npm run build

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          # musl-tools provides the x86_64 musl-gcc wrapper.
          # gcc-aarch64-linux-gnu is a glibc-based cross-linker, but Rust
          # statically links musl's libc — the GNU linker just needs to
          # produce aarch64 ELF output. Do not remove it.
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == aarch64* ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.check-version.outputs.tag }}
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/rewind" dist/
          cp "target/${{ matrix.target }}/release/rewind-mcp" dist/
          cd dist
          tar -czf "rewind-${RELEASE_TAG}-${MATRIX_NAME}.tar.gz" rewind rewind-mcp
          shasum -a 256 "rewind-${RELEASE_TAG}-${MATRIX_NAME}.tar.gz" > "rewind-${RELEASE_TAG}-${MATRIX_NAME}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rewind-${{ matrix.name }}
          path: dist/*.tar.gz*

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        env:
          RELEASE_TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          files: |
            *.tar.gz
            *.sha256
          generate_release_notes: true
